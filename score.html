<!DOCTYPE html>
<html>
<head>
<title>Minigolf League</title>
<style>
  /* ===== GLOBAL LAYOUT ===== */
  body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #1a3d2e; color: #fff; }
  .container { display: grid; grid-template-columns: 1.25fr 1fr; gap: 15px;
               padding: 15px; height: 100vh; box-sizing: border-box; }
  .left { background: #2d5a3d; border-radius: 10px; padding: 25px; overflow: auto; }
  .right { display: grid; grid-template-rows: 1fr 1.3fr; gap: 15px; }
  .module { background: #2d5a3d; border-radius: 10px; padding: 25px; overflow: auto; position: relative; }
  h2 { margin-top: 0; font-size: 28px; border-bottom: 3px solid #7cb342;
       padding-bottom: 10px; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="container">
  <div class="left"  id="standings-panel">Loading standings...</div>
  <div class="right">
    <div class="module" id="upcoming-panel"><h2>Upcoming Matches</h2><p>Coming soon...</p></div>
    <div class="module" id="scoring-panel"><h2>Live Scoreboard</h2><p>Coming soon...</p></div>
  </div>
</div>

<script>
/* ===== API CONFIG ===== */
const API_URL = 'https://script.google.com/macros/s/AKfycbx6FiPS3jaIKs9lD0TIHkMskdPjFfUvH4siagSjB8kuWLBxoy8JbH1EYL1sy_8nanlA/exec';
const API_TOKEN = '12MP67';

/* ===== API HELPER ===== */
async function apiGet(action, extra = {}) {
  const params = new URLSearchParams({ action, token: API_TOKEN, ...extra });
  const res = await fetch(`${API_URL}?${params}`);
  return res.json();
}

async function apiPost(action, payload = {}) {
  const body = JSON.stringify({ action, token: API_TOKEN, ...payload });
  const res = await fetch(API_URL, { method: 'POST', body });
  return res.json();
}

/* ===== PANEL LOADER ===== */
async function loadPanel(url, containerId) {
  const html = await fetch(url).then(r => r.text());
  const container = document.getElementById(containerId);
  container.innerHTML = html;
  // Re-execute inline <script> tags
  container.querySelectorAll('script').forEach(s => {
    const newScript = document.createElement('script');
    newScript.textContent = s.textContent;
    document.body.appendChild(newScript);
  });
}

/* ===== BOOT ===== */
(async function boot() {
  await loadPanel('standings.html', 'standings-panel');
  // (upcoming and scoring panels will be added later)
  setTimeout(() => {
    if (window.StandingsPanel) StandingsPanel.refresh();
  }, 50);
})();

/* ===== 30-SECOND POLLING REFRESH ===== */
setInterval(() => {
  if (window.StandingsPanel) StandingsPanel.refresh();
}, 30000);
</script>
</body>
</html>
